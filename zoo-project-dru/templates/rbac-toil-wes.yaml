{{- if .Values.toilWes.enabled -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Release.Name }}-toil-wes
  labels:
    {{- include "zoo-project-dru.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources:
      - pods
      - pods/log
      - pods/status
      - configmaps
      - secrets
      - services
      - persistentvolumeclaims
      - events
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups: ["batch"]
    resources:
      - jobs
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
      - deletecollection
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Release.Name }}-toil-wes
  labels:
    {{- include "zoo-project-dru.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ .Values.toilWes.serviceAccountName | default (printf "%s-processing-manager" .Release.Name) }}
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ .Release.Name }}-toil-wes
{{- end }}
